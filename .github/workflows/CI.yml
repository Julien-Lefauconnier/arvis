name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-type:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -e .[dev] --prefer-binary

      - name: Fail on missing __all__
        run: python -c "import arvis; assert hasattr(arvis, '__all__') and arvis.__all__"

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy arvis --strict

  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -e .[dev] --prefer-binary

      - name: Run tests
        run: pytest --cov=arvis --cov-report=xml --maxfail=1 --disable-warnings -q

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5

  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -e .[dev] --prefer-binary

      - name: Run examples smoke (stable examples)
        run: bash scripts/run_examples_smoke.sh
