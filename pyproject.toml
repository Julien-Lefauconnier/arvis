[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "arvis-posix"
version = "1.0.0"
description = "ARVIS POSIX — minimal kernel primitives for stable cognitive systems"
readme = "README.md"
requires-python = ">=3.10"

authors = [
  { name="Julien Lefauconnier", email="jlefauconnier@proton.me" }
]

license = { file = "LICENSE" }

keywords = [
  "ai",
  "cognitive-systems",
  "stability",
  "lyapunov",
  "reasoning",
  "uncertainty",
  "memory",
  "kernel"
]

classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
]

dependencies = []

[project.optional-dependencies]
dev = [
    "mypy",
    "ruff",
    "pytest",
    "pytest-cov",
]

[project.urls]
Homepage = "https://github.com/arvis-ai/arvis-posix"
Repository = "https://github.com/arvis-ai/arvis-posix"
Documentation = "https://github.com/arvis-ai/arvis-posix/docs"

[tool.setuptools.packages.find]
include = ["arvis*"]